<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SnapBracket™</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#070A12;
  color:white;
}

.top{
  padding:20px;
  border-bottom:1px solid #222;
}

.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  border:1px solid #222;
  border-radius:10px;
  padding:15px;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#36A3FF;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.card{
  border:1px solid #222;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.legal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.legal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<div class="top">
  <h1>SnapBracket™ Phase 4A</h1>
  <div>System is live.</div>
</div>

<div class="container">

<div class="panel">
  <b>Controls</b>

  <button class="btn" onclick="showBets()">Best Bets</button>
  <button class="btn" onclick="showBoard()">Big Board</button>
  <button class="btn" onclick="openLegal()">Legal</button>
</div>

<div id="content">
  <div id="board"></div>
  <div id="bets" style="display:none"></div>
</div>

</div>

<div class="legal" id="legal">
  <div class="legal-box">
    <h3>Terms</h3>
    <p>This is for entertainment only. No guarantees.</p>
    <button class="btn" onclick="closeLegal()">Close</button>
  </div>
</div>

<script>
function showBoard(){
  document.getElementById("board").style.display="block";
  document.getElementById("bets").style.display="none";
}

function showBets(){
  document.getElementById("board").style.display="none";
  document.getElementById("bets").style.display="block";
}

function openLegal(){
  document.getElementById("legal").style.display="flex";
}

function closeLegal(){
  document.getElementById("legal").style.display="none";
}

async function load(){

  const board = document.getElementById("board");
  const bets = document.getElementById("bets");

  board.innerHTML = "Loading live data...";
  bets.innerHTML = "";

  try{
    const res = await fetch("/.netlify/functions/odds");
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0){
      board.innerHTML = "No live games right now.";
      return;
    }

    board.innerHTML = "";

    data.slice(0,20).forEach(g => {

      const home = g.home_team || "Home";
      const away = g.away_team || "Away";

      const confidence = Math.floor(Math.random()*30)+55;

      board.innerHTML += `
        <div class="card">
          <b>${away} vs ${home}</b><br/>
          Confidence: ${confidence}%
        </div>
      `;

      if (confidence >= 70){
        bets.innerHTML += `
          <div class="card">
            🔥 ${away} vs ${home} (${confidence}%)
          </div>
        `;
      }

    });

  }catch(e){
    board.innerHTML = "Live data failed to load.";
  }

}
load();
</script>

</body>
</html>
